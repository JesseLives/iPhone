workflows:
  flutter-ios:
    name: Calculator IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get

      - name: Build unsigned IPA
        script: |
          flutter build ios --release --no-codesign

          mkdir -p /tmp/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/Payload/
          cd /tmp
          zip -r "$CM_BUILD_DIR/Calculator.ipa" Payload

    artifacts:
      - Calculator.ipa
