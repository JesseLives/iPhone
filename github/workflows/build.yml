name: Build Flutter iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p /tmp/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/Payload/
          cd /tmp
          zip -r "$GITHUB_WORKSPACE/Calculator.ipa" Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Calculator.ipa
          path: Calculator.ipa
          retention-days: 30
